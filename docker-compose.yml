services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - ./backend/.env
    # environment:
    #   GEMINI_API_KEY: ${GEMINI_API_KEY}
    #   GEMINI_MODEL: ${GEMINI_MODEL}
    #   FRONTEND_URL: ${FRONTEND_URL}
    volumes:
      - app-data:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  app-data:
